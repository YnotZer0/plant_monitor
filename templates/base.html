<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Plant Monitor{% endblock %}</title>
<style>
  :root {
    --bg: #f4f7f2; --card: #ffffff; --ink: #1e2a22; --muted: #6b7a6e;
    --accent: #2e8b57; --accent-dark: #1f6b43;
    --good: #2ecc71; --fair: #f1c40f; --poor: #e67e22; --crit: #e74c3c;
    --border: #e1e8e0;
  }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         margin: 0; background: var(--bg); color: var(--ink); line-height: 1.5; }
  header { background: var(--accent); color: white; padding: 1rem 1.5rem;
           display: flex; justify-content: space-between; align-items: center; }
  header a { color: white; text-decoration: none; }
  header h1 { margin: 0; font-size: 1.3rem; }
  .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
  .btn { background: var(--accent); color: white; border: 0; padding: 0.6rem 1.1rem;
         border-radius: 6px; text-decoration: none; display: inline-block;
         cursor: pointer; font-size: 0.95rem; font-weight: 500; }
  .btn:hover { background: var(--accent-dark); }
  .btn-secondary { background: #6b7a6e; }
  .card { background: var(--card); border: 1px solid var(--border);
          border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
          gap: 1rem; }
  .plant-card { text-decoration: none; color: inherit; transition: transform 0.15s; }
  .plant-card:hover { transform: translateY(-2px); }
  .plant-card img { width: 100%; height: 180px; object-fit: cover;
                    border-radius: 6px; background: #ddd; }
  .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px;
           font-size: 0.8rem; font-weight: 600; color: white; }
  .badge.excellent, .badge.good { background: var(--good); }
  .badge.fair { background: var(--fair); color: #222; }
  .badge.poor { background: var(--poor); }
  .badge.critical { background: var(--crit); }
  .badge.unknown { background: #95a5a6; }
  .flash { background: #fffae6; border-left: 4px solid var(--fair);
           padding: 0.75rem 1rem; margin-bottom: 1rem; border-radius: 4px; }
  input, textarea, select { width: 100%; padding: 0.6rem; border: 1px solid var(--border);
                            border-radius: 6px; font-size: 1rem; font-family: inherit; }
  label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 500; }
  .meta { color: var(--muted); font-size: 0.9rem; }
  .reading-img { width: 100%; max-width: 600px; border-radius: 8px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid var(--border); }
  th { background: #f0f4ef; font-weight: 600; }
  .row { display: flex; gap: 1rem; flex-wrap: wrap; }
  .col { flex: 1; min-width: 280px; }
  h2 { margin-top: 0; }
  .status-row { display: flex; gap: 1.5rem; flex-wrap: wrap; margin: 0.5rem 0; }
  .status-item { font-size: 0.95rem; }
  .status-item strong { display: block; color: var(--muted); font-size: 0.75rem;
                        text-transform: uppercase; letter-spacing: 0.5px; }
  canvas { max-width: 100%; }
  .analyzer-tag { display: inline-block; padding: 0.1rem 0.5rem; border-radius: 10px;
                  font-size: 0.7rem; background: #eef; color: #335; margin-left: 0.3rem;
                  font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .analyzer-tag.cloud { background: #e3f2fd; color: #0d47a1; }
  .analyzer-tag.local { background: #f3e5f5; color: #4a148c; }
</style>
</head>
<body>
<header>
  <h1><a href="{{ url_for('index') }}">🌱 Plant Monitor</a></h1>
  <div style="display: flex; gap: 1rem; align-items: center;">
    <span style="font-size: 0.85rem; opacity: 0.9;">
      Mode: <strong>{{ analyzer_mode }}</strong>
      {% if cloud_available %}<span title="Cloud available">☁️</span>
      {% else %}<span title="Cloud unavailable - offline mode">📴</span>{% endif %}
    </span>
    <nav><a href="{{ url_for('new_plant') }}">+ Add plant</a></nav>
  </div>
</header>
<main class="container">
  {% with messages = get_flashed_messages() %}
    {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
